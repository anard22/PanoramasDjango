{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar Sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'core/css/estilos.css' %" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-4">
          <div class="text-center mb-3">
           <img src="{% static 'core/img/logo.png' %}" width="150">
          </div>
          <div class="card p-4">
            <h3 class="text-center mb-3">Iniciar Sesión</h3>
            <form id="formLogin">
              <label>Correo</label
              ><input
                type="email"
                id="loginEmail"
                class="form-control mb-3"
                required
              /><label>Contraseña</label
              ><input
                type="password"
                id="loginPass"
                class="form-control mb-3"
                required
              /><button class="btn btn-custom w-100">Ingresar</button>
            </form>
            <a href="recuperar.html" class="d-block text-center mt-3"
              >¿Olvidaste tu contraseña?</a
            ><a href="registro.html" class="d-block text-center"
              >Crear cuenta</a
            >
          </div>
        </div>
      </div>
    </div>
    <script src="{% static 'core/js/validaciones.js' %}"></script>
  </body>
</html>
